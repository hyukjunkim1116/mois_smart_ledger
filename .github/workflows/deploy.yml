name: Flutter Web Deploy

on:
  push:
    branches:
      - main # main 브랜치에 push될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Flutter 환경 설정
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.4' # 사용 중인 Flutter 버전으로 수정 가능

      # 3. 의존성 설치
      - name: Install dependencies
        run: flutter pub get

      # 4. Flutter Web 빌드 (PWA 및 Base-Href 설정)
      # 저장소 이름이 'mois_smart_ledger'라고 가정합니다.
      # 실제 저장소 이름으로 반드시 수정하세요!
      - name: Build Web
        run: flutter build web --release --base-href "/mois_smart_ledger/" --pwa-strategy=offline-first --web-renderer html

      # 5. 404 에러 방지 (index.html을 404.html로 복사)
      - name: Create 404 page
        run: cp build/web/index.html build/web/404.html

      # 6. GitHub Pages로 배포
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.DEPLOY_SECRET_KEY }}
          publish_dir: ./build/web
          publish_branch: gh-pages # 빌드 결과물이 저장될 브랜치